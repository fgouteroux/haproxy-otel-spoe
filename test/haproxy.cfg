global
    log stdout format raw local0 info

defaults
    mode    http
    log     global
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:8080

    unique-id-format %[uuid()]
    unique-id-header X-Request-ID

    http-request set-var(txn.otel_attrs) str(environment=test;team=ops)

    filter spoe engine otel-agent config /usr/local/etc/haproxy/spoe-otel.cfg

    http-request set-header traceparent %[var(txn.otel.traceparent)] if { var(txn.otel.traceparent) -m found }

    default_backend http_back

backend http_back
    server backend backend:80 check

backend spoe-otel-backend
    mode    tcp
    timeout connect 5ms
    timeout server  100ms
    server  otel-agent agent:12345
