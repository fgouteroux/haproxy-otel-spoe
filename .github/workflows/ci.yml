name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify module checksums
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath \
            -ldflags "-s -w \
              -X github.com/fgouteroux/haproxy-otel-spoe/internal.Version=${VERSION} \
              -X github.com/fgouteroux/haproxy-otel-spoe/internal.Commit=${COMMIT} \
              -X github.com/fgouteroux/haproxy-otel-spoe/internal.BuildTime=${BUILD_TIME}" \
            -o dist/haproxy-otel-spoe-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: haproxy-otel-spoe-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7
