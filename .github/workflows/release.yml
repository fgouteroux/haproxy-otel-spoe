name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # create GitHub releases and upload assets
  id-token: write       # OIDC token for cosign keyless signing

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog generation

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
