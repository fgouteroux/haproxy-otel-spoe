version: 2

updates:
  # Go module dependencies
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Europe/Paris"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Europe/Paris"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 10
