global
    log stdout format raw local0 info

defaults
    mode    http
    log     global
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:80

    # Required for request/response correlation in the SPOE agent.
    unique-id-format %[uuid()]
    unique-id-header X-Request-ID

    # Optional: custom span attributes for this frontend (semicolon-separated key=value).
    # fe_name and fe_port are always sent automatically — no need to set them here.
    http-request set-var(txn.otel_attrs) str(environment=production;datacenter=eu-west-1)

    # Load the SPOE filter — sends request/response events to the agent.
    filter spoe engine otel-agent config /etc/haproxy/spoe-otel.cfg


    # Inject the W3C traceparent returned by the SPOE agent into the upstream request.
    # The variable is only set when the agent responded successfully.
    http-request set-header traceparent %[var(txn.otel.traceparent)]  if { var(txn.otel.traceparent) -m found }

    default_backend http_back

frontend api_front
    bind *:8443

    unique-id-format %[uuid()]
    unique-id-header X-Request-ID

    # Different custom attributes for this frontend.
    http-request set-var(txn.otel_attrs) str(environment=production;team=platform)

    filter spoe engine otel-agent config /etc/haproxy/spoe-otel.cfg


    http-request set-header traceparent %[var(txn.otel.traceparent)]  if { var(txn.otel.traceparent) -m found }

    default_backend api_back

backend http_back
    server app1 127.0.0.1:8080 check

backend api_back
    server api1 127.0.0.1:9090 check

# Backend used by the SPOE filter to reach the agent.
backend spoe-otel-backend
    mode    tcp
    balance roundrobin
    timeout connect 5ms
    timeout server  100ms
    server  otel-agent 127.0.0.1:12345
